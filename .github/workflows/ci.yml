name: CI

# Verifies that each app's lockfile is reproducible with its pinned Node + pnpm.
# Backend runs on Node 22 (Strapi 5.30), frontend on Node 24 (Next 16); pnpm is
# resolved from each package's `packageManager` field via Corepack.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: backend/.nvmrc
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

  frontend:
    name: frontend (Node 24)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile
